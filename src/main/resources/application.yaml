spring:
  application:
    name: FuturaFlow
  datasource:
    url: jdbc:mysql://futuraflow-03-harbar-0dc7.l.aivencloud.com:12189/defaultdb?sslMode=REQUIRED
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    baseline-on-migrate: true
    servlet:
    multipart:
      # Максимальний розмір одного файлу
      max-file-size: 10MB
      # Максимальний розмір всього тіла запиту
      max-request-size: 10MB