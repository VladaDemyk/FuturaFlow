name: Backend CI Pipeline

# Запускати робота при кожному Push або Pull Request у гілки main та develop
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest # Робот працюватиме на віртуальній машині з Linux

    steps:
      # 1. Завантажуємо твій код на віртуальну машину
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Встановлюємо Java 17 (якщо в тебе інша версія - зміни цифру)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # Кешуємо бібліотеки, щоб наступного разу збиралося швидше

      # 3. Збираємо проєкт через Maven
      # -DskipTests використовуємо тимчасово, бо для тестів потрібен реальний файл .env та БД
      - name: Build with Maven
        run: mvn clean package -DskipTests